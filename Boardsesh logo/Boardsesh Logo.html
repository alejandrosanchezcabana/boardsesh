<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Boardsesh — Brand system</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  html, body { margin: 0; padding: 0; background: #0a0a0c; height: 100%; font-family: "Archivo", sans-serif; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="logos.jsx"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const root = ReactDOM.createRoot(document.getElementById("root"));
  root.render(
    <DesignCanvas title="Boardsesh — Brand system">
      <DCSection id="lockups" title="Lockups">
        <DCArtboard id="primary" label="Primary horizontal" width={760} height={300}>
          <LockupHorizontal />
        </DCArtboard>
        <DCArtboard id="stacked" label="Stacked" width={520} height={420}>
          <LockupStacked />
        </DCArtboard>
        <DCArtboard id="compact" label="Compact sizes" width={480} height={360}>
          <LockupCompact />
        </DCArtboard>
        <DCArtboard id="clearspace" label="Clear space" width={520} height={420}>
          <ClearSpace />
        </DCArtboard>
        <DCArtboard id="mono" label="Mono fallbacks" width={680} height={300}>
          <MonoVariants />
        </DCArtboard>
      </DCSection>

      <DCSection id="icons" title="App icons">
        <DCArtboard id="appicons" label="Icon flavors" width={760} height={320}>
          <AppIcons />
        </DCArtboard>
        <DCArtboard id="scale" label="Scale ladder" width={760} height={300}>
          <AppIconScale />
        </DCArtboard>
        <DCArtboard id="favicon" label="Browser tabs" width={520} height={300}>
          <FaviconMockup />
        </DCArtboard>
      </DCSection>

      <DCSection id="stickers" title="Stickers — marketing">
        <DCArtboard id="round" label="Die-cut round" width={420} height={420}>
          <StickerRound />
        </DCArtboard>
        <DCArtboard id="slap" label="Slap" width={520} height={320}>
          <StickerSlap />
        </DCArtboard>
        <DCArtboard id="tagline" label="Tagline" width={460} height={420}>
          <StickerTagline />
        </DCArtboard>
        <DCArtboard id="boardset" label="Board pack" width={520} height={420}>
          <StickerBoardSet />
        </DCArtboard>
        <DCArtboard id="sent" label="SENT reward" width={420} height={420}>
          <StickerSent />
        </DCArtboard>
        <DCArtboard id="bumper" label="Bumper" width={620} height={260}>
          <StickerBumper />
        </DCArtboard>
      </DCSection>

      <DCSection id="usecases" title="In the wild">
        <DCArtboard id="splash" label="App splash" width={400} height={520}>
          <UseSplash />
        </DCArtboard>
        <DCArtboard id="tshirt" label="T-shirt" width={420} height={420}>
          <UseTShirt />
        </DCArtboard>
        <DCArtboard id="social" label="Social profile" width={460} height={300}>
          <UseSocial />
        </DCArtboard>
        <DCArtboard id="card" label="Business card" width={520} height={300}>
          <UseCard />
        </DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
</script>
</body>
</html>
